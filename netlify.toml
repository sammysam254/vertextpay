# Netlify configuration for Vertext Pay

[build]
  publish = "."

# Redirect /dashboard to dashboard.html for clean URLs
[[redirects]]
  from = "/dashboard"
  to   = "/dashboard.html"
  status = 200

[[redirects]]
  from = "/auth"
  to   = "/auth.html"
  status = 200

# Security headers — important for a payment app
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    X-XSS-Protection          = "1; mode=block"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy   = "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.paystack.co https://*.paystack.com https://cdn.jsdelivr.net https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com https://paystack.com https://*.paystack.com; font-src 'self' https://fonts.gstatic.com https://paystack.com https://*.paystack.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.paystack.co https://paystack.com https://*.paystack.com; frame-src https://js.paystack.co https://paystack.com https://*.paystack.com; img-src 'self' data: https:;"

# Cache static assets (no-cache for updates, except assets)
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML pages — no cache (so updates deploy instantly)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
